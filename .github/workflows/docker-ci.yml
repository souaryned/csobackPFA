name: CI - Backend to Docker Hub

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: csoapp-backend   # <<< this line makes env secrets available
    steps:
      - uses: actions/checkout@v4

      - name: Validate secrets
        env:
          DU: ${{ secrets.DOCKERHUB_USERNAME }}
          DT: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          [ -n "$DU" ] || (echo "DOCKERHUB_USERNAME is empty" && exit 1)
          [ -n "$DT" ] || (echo "DOCKERHUB_TOKEN is empty" && exit 1)

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute tags
        id: meta
        run: echo "SHA_TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            azizhasnaoui/csoapp-backend:latest
            azizhasnaoui/csoapp-backend:${{ steps.meta.outputs.SHA_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
