name: CI/CD - Backend → Docker Hub + Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: csoapp-backend   # ensures env-scoped secrets are available
    outputs:
      sha_tag: ${{ steps.meta.outputs.SHA_TAG }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate Docker Hub secrets
        env:
          DU: ${{ secrets.DOCKERHUB_USERNAME }}
          DT: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          [ -n "$DU" ] || (echo "DOCKERHUB_USERNAME is empty" && exit 1)
          [ -n "$DT" ] || (echo "DOCKERHUB_TOKEN is empty" && exit 1)

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute tags
        id: meta
        run: echo "SHA_TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - name: Build & Push (backend)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            azizhasnaoui/csoapp-backend:latest
            azizhasnaoui/csoapp-backend:${{ steps.meta.outputs.SHA_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-backend:
    runs-on: ubuntu-latest
    environment: csoapp-backend
    needs: build-and-push
    steps:
      - name: Validate deploy secrets
        env:
          HOST: ${{ secrets.SSH_HOST }}
          USER: ${{ secrets.SSH_USER }}
          KEY:  ${{ secrets.SSH_KEY }}
        run: |
          [ -n "$HOST" ] || (echo "Missing SSH_HOST" && exit 1)
          [ -n "$USER" ] || (echo "Missing SSH_USER" && exit 1)
          [ -n "$KEY"  ] || (echo "Missing SSH_KEY" && exit 1)

      - name: Write SSH key
        run: |
          echo "${{ secrets.SSH_KEY }}" > ssh_key
          chmod 600 ssh_key

      - name: Deploy (pull new image & restart api)
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
          APP_DIR:  ${{ vars.APP_DIR || '/opt/csoapp' }}
          TAG:      ${{ needs.build-and-push.outputs.sha_tag }}
        run: |
          SSH="ssh -o StrictHostKeyChecking=no -i ssh_key -p $SSH_PORT $SSH_USER@$SSH_HOST"
          $SSH "cd $APP_DIR && BACKEND_TAG=$TAG docker compose -f docker-compose.prod.yml pull api"
          $SSH "cd $APP_DIR && BACKEND_TAG=$TAG docker compose -f docker-compose.prod.yml up -d api"
